name: Update sector heatmap (intraday)

# Refreshes data/sectors_live.json every 10 minutes during US market hours
# so the sector heatmap on markets.html shows today's percentage change
# instead of yesterday's close. Longer periods (1W/1M/YTD/1Y) on the tiles
# still read the daily CSVs, which the main daily workflow refreshes.
#
# Cron: */5 12-22 * * 1-5
#   - every 5 minutes during UTC hours 12-22, Monday-Friday
#   - Covers EDT 12:00-22:00 (8am-6pm ET) and EST 12:00-22:00 (7am-5pm ET)
#     — gives us pre-market coverage so the first fresh live snapshot lands
#     BEFORE 9:30 AM ET open, not 2 hours after. GitHub Actions cron drifts
#     up to ~15 min, so scheduling every 5 min gives ~3× as many chances
#     to fire before the tiles look stale to a viewer at market open.
#
# The client-side markets.html only trusts live data for ≤4 hours;
# beyond that it falls back to the daily CSV's last-close-vs-prior-close,
# so tiles keep showing correct day-over-day numbers overnight without
# looking "frozen."
#
# Manual trigger available from the Actions tab (workflow_dispatch).

on:
  schedule:
    - cron: '*/5 12-22 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-sectors-intraday
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch intraday sector quotes
        run: python scripts/update-sectors-intraday.py

      - name: Commit and push if data changed
        run: |
          if [ -n "$(git status --porcelain data/sectors_live.json)" ]; then
            git config user.name  "BATS.CO Sectors Bot"
            git config user.email "bot@bats.co"
            git add data/sectors_live.json
            git commit -m "chore: refresh sectors_live $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
            echo "::notice::Pushed refreshed intraday sector data."
          else
            echo "::notice::Sector prices unchanged; nothing to commit."
          fi
